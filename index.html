<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>5295 STUDIO | 頂級汽車美容</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

    <style>
        :root { --bg: #050505; --gold: #d1c1a5; --red: #d92128; --text: #f0f0f0; --box: rgba(209, 193, 165, 0.05); }
        body { margin: 0; background-color: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; padding-bottom: 80px;}
        header { text-align: center; padding: 15px 0; border-bottom: 1px solid rgba(209, 193, 165, 0.3); background: #0a0a0a; }
        .logo-img { max-width: 180px; height: auto; display: block; margin: 0 auto; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .card { background-color: var(--box); border: 1px solid var(--gold); border-radius: 8px; padding: 20px; margin-bottom: 20px; position: relative; }
        h2 { color: var(--gold); border-bottom: 1px dashed var(--gold); padding-bottom: 10px; margin-top: 0; font-size: 18px;}
        label { display: block; margin-top: 15px; font-size: 13px; color: #aaa; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; background-color: rgba(0,0,0,0.5); border: 1px solid var(--gold); color: var(--gold); border-radius: 4px; box-sizing: border-box; font-size: 14px;}
        .btn { display: block; width: 100%; padding: 15px; margin-top: 20px; background-color: var(--gold); color: #000; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        .hidden { display: none !important; }
        
        .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 16px; color: var(--gold);}
        .cal-nav button { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; border-radius: 4px;}
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-header { font-size: 12px; color: #aaa; padding-bottom: 5px; border-bottom: 1px solid #333;}
        .cal-day { background: #111; border: 1px solid #333; border-radius: 4px; padding: 8px 2px; font-size: 12px; height: 50px; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.2s;}
        .cal-day.active { border: 2px solid var(--red) !important; background: rgba(217, 33, 40, 0.15);}
        .cal-day.past { opacity: 0.3; border-color: #222 !important; background: #000; }
        .cal-day.busy { opacity: 0.5; background: #331111; border-color: var(--red); color: #aaa; }
        
        .time-slot-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; border-top: 1px dashed #333; padding-top: 15px;}
        .time-slot { background: #1a1a1a; border: 1px solid #444; color: #ccc; padding: 10px 0; text-align: center; border-radius: 4px; font-size: 13px;}
        .time-slot.selected { border: 1px solid var(--red); background: rgba(217, 33, 40, 0.15); color: #fff;}
        
        /* 服務與照片 UI */
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .photo-box { height: 100px; background: #111; border: 1px dashed var(--gold); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--gold); background-size: cover; background-position: center; border-radius: 4px; position: relative;}
        .photo-main { grid-column: span 2; height: 180px; }
        .service-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; animation: fadeIn 0.3s ease; }
        .service-row select { margin-top: 0; flex: 1; }
        .btn-remove { background: transparent; border: 1px solid var(--red); color: var(--red); padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* 儀表板專屬 UI */
        .dash-car-img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; border: 1px solid var(--gold); margin-bottom: 15px; }
        .dash-box { background: #111; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid var(--red); }
        .progress-container { width: 100%; background: #222; border-radius: 10px; height: 12px; margin-top: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #d1c1a5, #d92128); border-radius: 10px; transition: width 1s ease; }

        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,5,5,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: var(--gold); text-align: center; padding: 20px;}
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(217, 33, 40, 0.9); color: #fff; padding: 12px 24px; border-radius: 30px; font-size: 14px; z-index: 10000; opacity: 0; transition: 0.3s; pointer-events: none; font-weight: bold; text-align: center;}
        #toast.show { opacity: 1; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center;}
        #crop-container { width: 100%; height: 70vh; background: #000; display: flex; justify-content: center; align-items: center; }
        #crop-image { display: block; max-width: 100%; max-height: 100%; }
        .modal-controls { padding: 15px; display: flex; justify-content: space-between; background: #000; border-top: 1px solid #333; width: 100%; box-sizing: border-box;}
        .modal-controls button { width: 48%; margin-top: 0; }
        
        #pricelist-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; justify-content: center; align-items: center; padding: 15px; box-sizing: border-box;}
        .img-wrapper { position: relative; max-width: 100%; display: flex; justify-content: center; align-items: center;}
        .close-circle { position: absolute; top: -12px; right: -12px; background: var(--red); color: #fff; border: 2px solid #fff; width: 36px; height: 36px; border-radius: 50%; font-size: 20px; font-weight: bold; line-height: 1; padding: 0; z-index: 2001; cursor: pointer;}
        
        #custom-alert { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;}
        .alert-box { background: #111; border: 1px solid var(--gold); border-radius: 8px; padding: 25px; text-align: center; width: 100%; max-width: 320px; }
        .alert-title { color: var(--gold); font-size: 18px; margin-top: 0; margin-bottom: 15px; border-bottom: 1px dashed #333; padding-bottom: 10px; font-weight: bold; }
        .alert-msg { color: #fff; font-size: 15px; line-height: 1.5; margin-bottom: 25px; }
    </style>
</head>
<body>

    <div id="loader">
        <img src="./logo.png" alt="5295 STUDIO" style="width: 150px; margin-bottom: 20px;">
        <p id="loader-text">系統載入中...</p>
    </div>
    
    <div id="toast">處理中...</div>
    
    <div id="custom-alert" class="hidden">
        <div class="alert-box">
            <h3 class="alert-title" id="custom-alert-title">提示</h3>
            <div id="custom-alert-msg" class="alert-msg">訊息內容</div>
            <button class="btn" style="margin-top:0; padding:10px;" onclick="document.getElementById('custom-alert').classList.add('hidden')">確定</button>
        </div>
    </div>
    
    <header><img src="./logo.png" alt="5295 STUDIO" class="logo-img"></header>

    <div class="container" id="main-container">
        
        <div id="view-step1" class="hidden">
            <div class="card">
                <h2>1. 我的愛車</h2>
                <div id="select-car-section">
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <select id="b-plate" onchange="renderCarPhotos(); updateServiceLogic();" style="flex: 1;"></select>
                        <button class="btn btn-outline" style="width: auto; margin-top: 5px; padding: 0 15px; font-size: 12px; white-space: nowrap;" onclick="toggleInlineNewCar(true)">+ 新增愛車</button>
                    </div>
                    <div style="margin-top: 15px;">
                        <div class="photo-box photo-main" id="p-main" onclick="triggerUpload('main')">+ 愛車主視覺</div>
                        <button id="toggle-photos-btn" class="btn btn-outline" style="padding: 8px; font-size: 12px; margin-top: 10px;" onclick="toggleExtraPhotos()">➕ 展開細節照片 (選填)</button>
                        <div id="extra-photos" class="photo-grid hidden">
                            <div class="photo-box" id="p-1" onclick="triggerUpload('1')">+ 車頭細節</div>
                            <div class="photo-box" id="p-2" onclick="triggerUpload('2')">+ 側邊細節</div>
                            <div class="photo-box" id="p-3" onclick="triggerUpload('3')">+ 車尾細節</div>
                            <div class="photo-box" id="p-4" onclick="triggerUpload('4')">+ 內裝細節</div>
                        </div>
                    </div>
                </div>

                <div id="inline-newcar-form" class="hidden" style="margin-top: 15px; padding: 15px; border: 1px dashed var(--gold); border-radius: 8px; background: rgba(0,0,0,0.3);">
                    <h3 style="margin-top:0; color: var(--gold); font-size: 16px;">建立專屬車庫</h3>
                    <div class="photo-box photo-main" id="nc-photo" onclick="triggerUpload('new-main')">+ 點擊上傳主視覺 (選填)</div>
                    <label>車牌號碼 <span style="color:var(--red);">*</span></label>
                    <input type="text" id="nc-plate" placeholder="例如: ABC-5295" style="text-transform: uppercase;">
                    <label>廠牌 <span style="color:var(--red);">*</span></label>
                    <select id="nc-brand" onchange="onBrandChange()"><option value="">請選擇廠牌</option></select>
                    <input type="text" id="nc-brand-other" class="hidden" placeholder="請手動輸入廠牌">
                    <label>型號 <span style="color:var(--red);">*</span></label>
                    <select id="nc-model" onchange="onModelChange()"><option value="">請先選擇廠牌</option></select>
                    <input type="text" id="nc-model-other" class="hidden" placeholder="請手動輸入型號">
                    
                    <div style="display:flex; gap:10px; margin-top: 20px;">
                        <button id="btn-cancel-nc" class="btn btn-outline" style="margin-top:0;" onclick="toggleInlineNewCar(false)">取消</button>
                        <button class="btn" style="margin-top:0;" onclick="submitNewCar()">確認新增</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>2. 服務項目 <span style="font-size: 10px; color:#888;">(最多選 5 項)</span></h2>
                <div id="service-container">
                    <div class="service-row">
                        <select class="service-select" onchange="updateServiceLogic()">
                            <option value="">-- 請選擇服務 --</option>
                            <option value="精緻洗車" data-time="60">精緻洗車 (1小時)</option>
                            <option value="精緻打蠟" data-time="90">精緻打蠟 (1.5小時)</option>
                            <option value="鍍膜維護" data-time="90">鍍膜維護 (1.5小時)</option>
                            <option value="除油膜+玻璃鍍膜" data-time="40">除油膜+玻璃鍍膜 (40分鐘)</option>
                            <option value="深層美容" data-time="180">深層美容 (3小時)</option>
                            <option value="經典鍍膜" data-time="240">經典鍍膜 (4小時)</option>
                            <option value="精緻鍍膜" data-time="540">精緻鍍膜 (需留車)</option>
                            <option value="臭氧除臭" data-time="20">臭氧除臭 (20分鐘)</option>
                            <option value="引擎室清洗" data-time="30">引擎室清洗 (30分鐘)</option>
                            <option value="客製化服務" data-time="60">客製化服務 (現場評估)</option>
                        </select>
                    </div>
                </div>
                
                <button class="btn btn-outline" style="font-size:12px; padding:8px; width:auto; border-style:dashed;" onclick="addServiceRow()">➕ 新增服務項目</button>
                <button type="button" class="btn btn-outline" style="padding: 8px; font-size: 12px; margin-top: 10px; border:none; text-decoration:underline;" onclick="document.getElementById('pricelist-modal').classList.remove('hidden')">📋 查看詳細價目表</button>
                
                <div style="margin-top: 15px; padding: 10px; background: #111; border-radius: 4px;">
                    <p style="margin:0; font-size: 14px; color: var(--gold);">預估總金額：<span id="realtime-price" style="color:var(--red); font-weight:bold; font-size:16px;">$0</span></p>
                    <p style="margin:5px 0 0 0; font-size: 14px; color: var(--gold);">預估總工時：<span id="total-time-text" style="color:var(--red); font-weight:bold; font-size:16px;">0 分鐘</span></p>
                </div>
            </div>

            <div class="card">
                <h2>3. 日期與時段</h2>
                <div class="cal-nav"><button onclick="changeMonth(-1)">❮</button><span id="cal-month-title"></span><button onclick="changeMonth(1)">❯</button></div>
                <div class="calendar-grid"><div class="cal-header">日</div><div class="cal-header">一</div><div class="cal-header">二</div><div class="cal-header">三</div><div class="cal-header">四</div><div class="cal-header">五</div><div class="cal-header">六</div></div>
                <div id="cal-body" class="calendar-grid" style="margin-top: 5px;"></div>

                <div id="time-selector" class="hidden">
                    <p style="margin-top:20px; font-size:14px; color:var(--gold);">智慧空檔搜尋結果 <span style="color:#888; font-size:12px;">(請務必選滿 3 個時段)</span></p>
                    <div id="time-slots-body" class="time-slot-container"></div>
                </div>
                <div style="margin-top: 15px; padding: 10px; background: #111; border-radius: 4px; font-size: 13px;">
                    已選時段：<br><span id="selected-dates-text" style="color: var(--red); font-weight: bold;">尚未選擇</span>
                </div>
                
                <button class="btn" onclick="goToStep2()" style="margin-top: 25px;">下一步：確認預約資訊</button>
            </div>
        </div>

        <div id="view-step2" class="hidden">
            <div class="card">
                <h2>確認預約資訊</h2>
                <div style="background: #111; padding: 15px; border-radius: 4px;">
                    <p>車牌：<span id="c-plate"></span></p>
                    <p>工時：<span id="c-duration" style="color:var(--gold);"></span></p>
                    <p>金額：<span id="c-price-display" style="color:var(--red); font-weight:bold; font-size:16px;"></span></p>
                    <p>項目：<span id="c-service"></span></p>
                    <p>時段：<span id="c-dates" style="color:var(--gold);"></span></p>
                </div>
                <button class="btn" onclick="submitFinalBooking()">確認送出預約</button>
                <button class="btn btn-outline" onclick="goBackStep1()" style="margin-top: 10px;">返回修改</button>
            </div>
        </div>
        
        <div id="view-dashboard" class="hidden">
            <h2 style="text-align:center; color:var(--gold); border:none; margin-top:10px;">我的愛車儀表板</h2>
            
            <select id="dash-plate" onchange="renderDashboard()" style="margin-bottom: 20px; font-size: 16px; padding: 15px; text-align: center;"></select>
            
            <img id="dash-img" class="dash-car-img" src="https://via.placeholder.com/800x400/111111/d1c1a5?text=NO+IMAGE">
            
            <div id="dash-content"></div>
            
            <button class="btn btn-outline" style="margin-top: 30px;" onclick="closeApp()">關閉儀表板</button>
        </div>
    </div>

    <div id="crop-modal" class="modal hidden">
        <div id="crop-container"><img id="crop-image"></div>
        <div class="modal-controls">
            <button class="btn btn-outline" onclick="cancelCrop()">取消</button>
            <button class="btn" onclick="confirmCrop()">確認裁剪</button>
        </div>
    </div>

    <div id="pricelist-modal" class="modal hidden" style="background: rgba(0,0,0,0.85); padding: 20px;">
        <div class="img-wrapper">
            <button class="close-circle" onclick="document.getElementById('pricelist-modal').classList.add('hidden')">✕</button>
            <img src="./list.jpg" alt="價目表" style="max-width: 100%; max-height: 85vh; object-fit: contain; border-radius: 8px; border: 2px solid var(--gold);">
        </div>
    </div>

    <input type="file" id="file-uploader" accept="image/*" style="display:none;">

    <script>
        // ==========================================
        // 🚨 系統設定區
        // ==========================================
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzWMGvwEe_e6pDVk6fQyj5JFCHnl5T4pAWPiEA4YQwPuxOevRyqlrRZ9n-Vo8bD8QYXWA/exec'; 
        const LIFF_ID = '2008811649-QZq68T5c'; 
        const DEFAULT_IMG = 'https://via.placeholder.com/800x400/111111/d1c1a5?text=NO+IMAGE';

        let globalUserId = ""; let globalLineName = "";
        let userCars = []; let carOptionsData = []; let userHistory = [];
        let newCarBase64 = ""; let currentUploadSlot = "";
        let cropper; 
        
        let calendarOverview = {}; let selectedTimeSlots = [];   
        let currentCalYear = new Date().getFullYear(); let currentCalMonth = new Date().getMonth();
        let currentTotalDuration = 0; let currentServicesArray = []; let lastSelectedDate = "";

        const washLevels = {"精緻洗車": 1, "精緻打蠟": 2, "深層美容": 3};
        const coatLevels = {"鍍膜維護": 1, "除油膜+玻璃鍍膜": 2, "經典鍍膜": 3, "精緻鍍膜": 4};

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function customAlert(msg, title = "系統提示") {
            document.getElementById('custom-alert-title').innerText = title;
            document.getElementById('custom-alert-msg').innerText = msg;
            document.getElementById('custom-alert').classList.remove('hidden');
        }

        function toggleExtraPhotos() {
            const el = document.getElementById('extra-photos');
            const btn = document.getElementById('toggle-photos-btn');
            el.classList.toggle('hidden');
            if (el.classList.contains('hidden')) btn.innerText = "➕ 展開細節照片 (選填)";
            else btn.innerText = "➖ 收起細節照片";
        }

        window.onload = function() {
            liff.init({ liffId: LIFF_ID }).then(() => {
                if (!liff.isLoggedIn()) { liff.login(); return; }
                liff.getProfile().then(p => {
                    globalUserId = p.userId; globalLineName = p.displayName;
                    fetchUserData();
                });
            }).catch(err => { 
                document.getElementById('loader-text').innerHTML = '<span style="color:var(--red);">系統載入失敗</span><br><span style="font-size:12px; color:#888;">請確認您是在 LINE APP 中開啟此連結。</span>';
            });
            
            const plateInput = document.getElementById('nc-plate');
            if (plateInput) {
                plateInput.addEventListener('input', function(e) {
                    let val = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
                    val = val.replace(/^([A-Z]{2,4})(\d{1,4})/, '$1-$2');
                    val = val.replace(/^(\d{2,4})([A-Z]{2,4})/, '$1-$2');
                    e.target.value = val;
                });
            }
        };

        function fetchUserData() {
            Promise.all([
                fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "checkUser", userId: globalUserId }) }).then(r=>r.json()),
                fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "getCalendarOverview" }) }).then(r=>r.json())
            ]).then(([userRes, calRes]) => {
                
                if (userRes.status === "error") throw new Error("GAS 錯誤: " + userRes.message);
                if (calRes.status === "error") throw new Error("行事曆錯誤: " + calRes.message);

                document.getElementById('loader').style.display = 'none';
                calendarOverview = calRes.data || {};
                carOptionsData = userRes.data.carOptions || [];
                userCars = userRes.data.cars || [];
                userHistory = userRes.data.history || [];
                
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('page') === 'dashboard') {
                    document.getElementById('view-dashboard').classList.remove('hidden');
                    initDashboard();
                } else {
                    document.getElementById('view-step1').classList.remove('hidden');
                    if (userCars.length === 0) {
                        toggleInlineNewCar(true);
                        // 修正：確保按鈕存在再操作，避免當機
                        let cancelBtn = document.getElementById('btn-cancel-nc');
                        if (cancelBtn) cancelBtn.style.display = 'none';
                    } else { initBookingForm(); }
                    renderCalendar(currentCalYear, currentCalMonth);
                }
            }).catch(err => {
                document.getElementById('loader').style.display = 'flex';
                document.getElementById('loader-text').innerHTML = `<span style="color:var(--red);">資料連線異常</span><br><span style="font-size:12px; color:#888;">${err.message || '請確認網路狀態'}</span>`;
                console.error(err);
            });
        }

        // ==========================================
        // 儀表板 (Dashboard) 渲染邏輯
        // ==========================================
        function initDashboard() {
            const select = document.getElementById('dash-plate');
            select.innerHTML = '';
            if (userCars.length === 0) {
                document.getElementById('dash-content').innerHTML = "<p style='text-align:center; color:#888;'>您目前還沒有建立車庫資料。</p>";
                return;
            }
            userCars.forEach(car => { select.innerHTML += `<option value="${car.plate}">${car.plate}</option>`; });
            renderDashboard();
        }

        function renderDashboard() {
            const plate = document.getElementById('dash-plate').value;
            const car = userCars.find(c => c.plate === plate);
            document.getElementById('dash-img').src = car.photoMain || DEFAULT_IMG;
            
            const history = userHistory.filter(h => h.plate === plate);
            const contentDiv = document.getElementById('dash-content');
            
            if (history.length === 0) {
                contentDiv.innerHTML = "<div class='dash-box'><p style='margin:0; color:#888;'>該車輛尚無保養紀錄。</p></div>";
                return;
            }
            
            let html = "";
            const latest = history[0]; 
            
            html += `<div class="dash-box">
                        <div style="font-size:12px; color:#888; margin-bottom:5px;">上次保養日期：${latest.date}</div>
                        <div style="font-size:18px; color:var(--gold); font-weight:bold;">${latest.service}</div>
                     </div>`;
                     
            if (latest.nextReminder) {
                const today = new Date();
                const nextDate = new Date(latest.nextReminder.replace(/-/g, '/'));
                const diffTime = nextDate - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                let percentage = Math.max(0, Math.min(100, (diffDays / 90) * 100));
                
                html += `<div class="dash-box" style="border-left-color: #1DB446;">
                            <div style="display:flex; justify-content:space-between; color:#fff; font-size:14px; margin-bottom:10px;">
                                <span>🛡️ 鍍膜防護力</span>
                                <span style="color:var(--gold); font-weight:bold;">尚餘 ${diffDays > 0 ? diffDays : 0} 天</span>
                            </div>
                            <div class="progress-container">
                                <div class="progress-bar" style="width: ${percentage}%;"></div>
                            </div>
                            <div style="font-size:11px; color:#888; margin-top:8px; text-align:right;">建議下次進廠：${latest.nextReminder}</div>
                         </div>`;
            }
            contentDiv.innerHTML = html;
        }

        // ==========================================
        // 預約系統邏輯 (包含防呆)
        // ==========================================
        function addServiceRow() {
            const container = document.getElementById('service-container');
            if (container.children.length >= 5) return showToast("最多選擇 5 項服務");
            const newRow = document.createElement('div');
            newRow.className = "service-row";
            newRow.innerHTML = container.children[0].innerHTML.replace('</select>', '</select><button class="btn-remove" onclick="removeServiceRow(this)">✕</button>');
            newRow.querySelector('select').value = ""; 
            container.appendChild(newRow);
            updateServiceLogic();
        }

        function removeServiceRow(btn) {
            btn.parentElement.remove();
            updateServiceLogic();
        }

        function updateServiceLogic() {
            const selects = Array.from(document.querySelectorAll('.service-select'));
            let selectedValues = selects.map(s => s.value);

            let maxWash = 0; let maxCoat = 0;
            selectedValues.forEach(v => {
                if (washLevels[v] > maxWash) maxWash = washLevels[v];
                if (coatLevels[v] > maxCoat) maxCoat = coatLevels[v];
            });

            let totalTime = 0; let hasSpecialCoating = false;

            selects.forEach((select, index) => {
                if (select.value && washLevels[select.value] && washLevels[select.value] < maxWash) {
                    select.value = ""; showToast("已自動為您整合包含在內的項目");
                }
                if (select.value && coatLevels[select.value] && coatLevels[select.value] < maxCoat) {
                    select.value = ""; showToast("已自動為您整合包含在內的項目");
                }

                if (select.value === "精緻鍍膜") hasSpecialCoating = true;

                const options = select.options;
                for (let opt of options) {
                    if (opt.value === "") continue;
                    opt.disabled = false;
                    opt.text = opt.text.replace(" (已包含)", "").replace(" (已選)", "");

                    let isSelectedElsewhere = selects.some((otherSelect, otherIndex) => { return index !== otherIndex && otherSelect.value === opt.value && otherSelect.value !== ""; });

                    if (isSelectedElsewhere) {
                        opt.disabled = true; opt.text += " (已選)";
                    } else if (washLevels[opt.value] && washLevels[opt.value] < maxWash) {
                        opt.disabled = true; opt.text += " (已包含)";
                    } else if (coatLevels[opt.value] && coatLevels[opt.value] < maxCoat) {
                        opt.disabled = true; opt.text += " (已包含)";
                    }
                }
                
                const selectedOpt = select.options[select.selectedIndex];
                if (selectedOpt && selectedOpt.value !== "" && !selectedOpt.text.includes("(已包含)") && !selectedOpt.text.includes("(已選)")) {
                    totalTime += parseInt(selectedOpt.dataset.time || 0);
                }
            });

            currentServicesArray = Array.from(new Set(Array.from(selects).map(s => s.value).filter(v => v !== "")));
            currentTotalDuration = totalTime;

            let displayTime = "0 分鐘";
            if (hasSpecialCoating) { displayTime = "1天 (需留車)"; currentTotalDuration = 540; }
            else if (totalTime > 0) {
                let h = Math.floor(totalTime / 60); let m = totalTime % 60;
                displayTime = h > 0 ? (m > 0 ? `${h} 小時 ${m} 分鐘` : `${h} 小時`) : `${m} 分鐘`;
            }

            document.getElementById('total-time-text').innerText = displayTime;
            fetchPrice();
            
            if(lastSelectedDate) {
                document.getElementById('time-slots-body').innerHTML = "";
                selectedTimeSlots = [];
                document.getElementById('selected-dates-text').innerHTML = "尚未選擇";
                selectDate(lastSelectedDate);
            }
        }

        function fetchPrice() {
            if(currentServicesArray.length === 0) { document.getElementById('realtime-price').innerText = "$0"; return; }
            document.getElementById('realtime-price').innerText = "計算中...";
            fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "getQuote", plate: document.getElementById('b-plate').value, services: currentServicesArray }) })
            .then(res => res.json()).then(res => { document.getElementById('realtime-price').innerText = res.data !== "現場評估報價" ? "$" + res.data : "現場評估報價"; });
        }

        function toggleInlineNewCar(show) {
            if (show) {
                populateBrandDropdown();
                document.getElementById('select-car-section').classList.add('hidden');
                document.getElementById('inline-newcar-form').classList.remove('hidden');
            } else {
                document.getElementById('inline-newcar-form').classList.add('hidden');
                document.getElementById('select-car-section').classList.remove('hidden');
            }
        }

        function populateBrandDropdown() {
            let brands = [...new Set(carOptionsData.map(o => o.brand))];
            let html = '<option value="">請選擇廠牌</option>';
            brands.forEach(b => html += `<option value="${b}">${b}</option>`);
            html += '<option value="other">其他 (自行輸入)</option>';
            document.getElementById('nc-brand').innerHTML = html;
        }

        function onBrandChange() {
            let brand = document.getElementById('nc-brand').value;
            let modelSel = document.getElementById('nc-model');
            if (brand === 'other') {
                document.getElementById('nc-brand-other').classList.remove('hidden');
                document.getElementById('nc-model-other').classList.remove('hidden');
                modelSel.innerHTML = '<option value="other">其他 (自行輸入)</option>';
            } else {
                document.getElementById('nc-brand-other').classList.add('hidden');
                document.getElementById('nc-model-other').classList.add('hidden');
                let models = carOptionsData.filter(o => o.brand === brand);
                let html = '<option value="">請選擇型號</option>';
                models.forEach(m => html += `<option value="${m.model}">${m.model}</option>`);
                html += '<option value="other">其他 (自行輸入)</option>';
                modelSel.innerHTML = html;
            }
        }

        function onModelChange() {
            let modelSel = document.getElementById('nc-model');
            if (modelSel.value === 'other') { document.getElementById('nc-model-other').classList.remove('hidden'); } 
            else { document.getElementById('nc-model-other').classList.add('hidden'); }
        }

        function submitNewCar() {
            const plate = document.getElementById('nc-plate').value.trim();
            let brand = document.getElementById('nc-brand').value; if(brand === 'other') brand = document.getElementById('nc-brand-other').value.trim();
            let model = document.getElementById('nc-model').value; if(model === 'other') model = document.getElementById('nc-model-other').value.trim();
            if(!plate || !brand || !model) return customAlert('請完整填寫車牌、廠牌與型號！');
            
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('loader-text').innerText = "建立車庫中...";
            
            const data = { lineName: globalLineName, plate: plate, brand: brand, model: model, imageBase64: newCarBase64 };
            fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "addCar", userId: globalUserId, carData: data }) })
            .then(res => res.json()).then(res => {
                if(res.status === 'success') location.reload(); 
                else { document.getElementById('loader').style.display = 'none'; customAlert('錯誤：' + res.message, '新增失敗'); }
            }).catch(() => { document.getElementById('loader').style.display = 'none'; showToast('連線異常'); });
        }

        function triggerUpload(slot) {
            currentUploadSlot = slot;
            document.getElementById('file-uploader').value = '';
            document.getElementById('file-uploader').click();
        }

        document.getElementById('file-uploader').onchange = function(e) {
            let file = e.target.files[0]; if (!file) return;
            let reader = new FileReader();
            reader.onload = function(event) {
                let image = document.getElementById('crop-image');
                image.src = event.target.result;
                document.getElementById('crop-modal').classList.remove('hidden');
                if (cropper) cropper.destroy(); 
                cropper = new Cropper(image, { aspectRatio: 16 / 9, viewMode: 2, autoCropArea: 0.9, background: false });
            };
            reader.readAsDataURL(file);
        };

        function cancelCrop() { document.getElementById('crop-modal').classList.add('hidden'); if (cropper) cropper.destroy(); }

        function confirmCrop() {
            if (!cropper) return;
            let canvas = cropper.getCroppedCanvas({ imageSmoothingQuality: 'high' });
            let base64 = canvas.toDataURL('image/jpeg', 0.8);
            cancelCrop();
            if (currentUploadSlot === 'new-main') {
                newCarBase64 = base64;
                document.getElementById('nc-photo').style.backgroundImage = `url('${base64}')`;
                document.getElementById('nc-photo').innerHTML = '';
            } else {
                document.getElementById('p-' + currentUploadSlot).style.backgroundImage = `url('${base64}')`;
                document.getElementById('p-' + currentUploadSlot).innerHTML = '';
                showToast("雲端上傳中...");
                const plate = document.getElementById('b-plate').value;
                fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "uploadPhoto", plate: plate, slot: currentUploadSlot, imageBase64: base64 }) })
                .then(res => res.json()).then(res => {
                    let car = userCars.find(c => c.plate === plate);
                    if(currentUploadSlot==='main') car.photoMain = res.data; else car['photo'+currentUploadSlot] = res.data;
                    showToast("照片上傳成功！");
                });
            }
        }

        function initBookingForm() {
            const select = document.getElementById('b-plate');
            select.innerHTML = '';
            userCars.forEach(car => { select.innerHTML += `<option value="${car.plate}">${car.plate} (${car.brand})</option>`; });
            renderCarPhotos();
            document.getElementById('select-car-section').classList.remove('hidden');
            
            let cancelBtn = document.getElementById('btn-cancel-nc');
            if (cancelBtn) cancelBtn.style.display = 'block';
        }

        function renderCarPhotos() {
            const plate = document.getElementById('b-plate').value;
            const car = userCars.find(c => c.plate === plate);
            const setPhoto = (id, url, text) => {
                const el = document.getElementById(id);
                if (url) { el.style.backgroundImage = `url('${url}')`; el.innerHTML = ''; } 
                else { el.style.backgroundImage = id === 'p-main' ? `url('${DEFAULT_IMG}')` : 'none'; el.innerHTML = id === 'p-main' ? '' : text; }
            };
            setPhoto('p-main', car.photoMain, '+ 愛車主視覺');
            setPhoto('p-1', car.photo1, '+ 車頭細節'); setPhoto('p-2', car.photo2, '+ 側邊細節');
            setPhoto('p-3', car.photo3, '+ 車尾細節'); setPhoto('p-4', car.photo4, '+ 內裝細節');
            
            updateServiceLogic(); 
        }

        function changeMonth(offset) {
            currentCalMonth += offset;
            if (currentCalMonth > 11) { currentCalMonth = 0; currentCalYear++; }
            if (currentCalMonth < 0) { currentCalMonth = 11; currentCalYear--; }
            renderCalendar(currentCalYear, currentCalMonth);
            document.getElementById('time-selector').classList.add('hidden'); 
        }

        function renderCalendar(year, month) {
            document.getElementById('cal-month-title').innerText = `${year} / ${String(month+1).padStart(2,'0')}`;
            const calBody = document.getElementById('cal-body');
            const now = new Date(); now.setHours(0,0,0,0);
            const firstDay = new Date(year, month, 1).getDay(); 
            const daysInMonth = new Date(year, month + 1, 0).getDate(); 
            let html = '';
            for (let i = 0; i < firstDay; i++) { html += `<div></div>`; }
            
            for (let d = 1; d <= daysInMonth; d++) {
                let cellDate = new Date(year, month, d);
                let dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                
                let isPast = cellDate < now;
                let isSunday = cellDate.getDay() === 0;
                let cssClass = isPast || isSunday ? 'past' : '';
                
                if (!isPast && !isSunday && calendarOverview[dateStr] >= 900) cssClass += ' busy';

                if(isPast || isSunday) html += `<div class="cal-day ${cssClass}">${d}</div>`;
                else html += `<div class="cal-day ${cssClass}" id="cal-day-${dateStr}" onclick="selectDate('${dateStr}')">${d}</div>`;
            }
            calBody.innerHTML = html;
        }

        function selectDate(dateStr) {
            if (currentTotalDuration === 0) return customAlert("請先選擇服務項目，系統才能計算空檔！");
            
            lastSelectedDate = dateStr;
            document.querySelectorAll('.cal-day').forEach(el => el.classList.remove('active'));
            document.getElementById('cal-day-' + dateStr).classList.add('active');

            document.getElementById('time-slots-body').innerHTML = "<p style='color:white; grid-column: span 4; text-align:center;'>正在運算最佳時段...</p>";
            document.getElementById('time-selector').classList.remove('hidden');

            fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "getSlots", date: dateStr, totalDuration: currentTotalDuration }) })
            .then(res => res.json()).then(res => {
                let html = '';
                if (!res.data || res.data.length === 0) {
                    html = "<p style='color:var(--red); grid-column: span 4; text-align:center;'>抱歉，該日剩餘空檔不足以進行此項服務，請選擇其他日期。</p>";
                } else {
                    res.data.forEach(time => {
                        let displayStr = `${dateStr} ${time}`;
                        let isSelected = selectedTimeSlots.includes(displayStr);
                        html += `<div class="time-slot ${isSelected?'selected':''}" onclick="toggleTimeSlot('${displayStr}', this)">${time}</div>`;
                    });
                }
                document.getElementById('time-slots-body').innerHTML = html;
            }).catch(err => { document.getElementById('time-slots-body').innerHTML = "<p style='color:red;'>連線錯誤</p>"; });
        }

        function toggleTimeSlot(displayStr, el) {
            if (selectedTimeSlots.includes(displayStr)) {
                selectedTimeSlots = selectedTimeSlots.filter(t => t !== displayStr);
                el.classList.remove('selected');
            } else {
                if (selectedTimeSlots.length >= 3) return showToast("最多選擇 3 個時段！");
                selectedTimeSlots.push(displayStr);
                el.classList.add('selected');
            }
            selectedTimeSlots.sort();
            document.getElementById('selected-dates-text').innerHTML = selectedTimeSlots.length > 0 ? '<br>' + selectedTimeSlots.join('<br>') : '尚未選擇';
        }

        function goToStep2() {
            if(currentServicesArray.length === 0) return customAlert("請至少選擇 1 項服務！");
            if(selectedTimeSlots.length !== 3) {
                customAlert("為了讓系統能為您安排最佳空檔，請務必選滿「 3 個時段」！", "預約提示");
                return;
            }
            document.getElementById('c-plate').innerText = document.getElementById('b-plate').value;
            document.getElementById('c-duration').innerText = document.getElementById('total-time-text').innerText;
            document.getElementById('c-price-display').innerText = document.getElementById('realtime-price').innerText;
            document.getElementById('c-service').innerHTML = '<br>' + currentServicesArray.join('<br>');
            document.getElementById('c-dates').innerHTML = '<br>' + selectedTimeSlots.join('<br>');
            
            document.getElementById('view-step1').classList.add('hidden');
            document.getElementById('view-step2').classList.remove('hidden');
        }

        function goBackStep1() {
            document.getElementById('view-step2').classList.add('hidden');
            document.getElementById('view-step1').classList.remove('hidden');
        }

        function closeApp() {
            try {
                if(liff.isInClient()) {
                    liff.closeWindow(); 
                } else {
                    document.getElementById('main-container').innerHTML = "<h2 style='text-align:center; color:var(--gold); margin-top: 50px;'>感謝！</h2><p style='text-align:center; color:white;'>請手動關閉此分頁，或返回 LINE 聊天室。</p>";
                    window.close();
                }
            } catch(e) {
                document.getElementById('main-container').innerHTML = "<h2 style='text-align:center; color:var(--gold); margin-top: 50px;'>感謝！</h2><p style='text-align:center; color:white;'>請手動關閉此分頁，或返回 LINE 聊天室。</p>";
            }
        }

        function submitFinalBooking() {
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('loader-text').innerText = "送出預約中...";
            
            const bData = { 
                plate: document.getElementById('b-plate').value, 
                services: currentServicesArray, 
                selectedDates: selectedTimeSlots, 
                price: document.getElementById('realtime-price').innerText,
                totalDuration: currentTotalDuration
            };
            
            fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "submitBooking", userId: globalUserId, bookingData: bData }) })
            .then(() => { 
                document.getElementById('loader').style.display = 'none';
                const successHtml = `
                    <div class="card" style="text-align:center; padding: 40px 20px;">
                        <div style="font-size: 50px; margin-bottom: 20px;">✅</div>
                        <h2 style="color:var(--gold); border:none; margin-bottom: 10px;">預約已送出</h2>
                        <p style="color:#ccc; font-size:15px; margin-bottom: 30px;">您的預約單已傳送至店家後台，<br>審核通過後將會透過 LINE 通知您！</p>
                        <button class="btn" onclick="closeApp()">完成並關閉</button>
                    </div>`;
                document.getElementById('main-container').innerHTML = successHtml;
            }).catch(() => {
                document.getElementById('loader').style.display = 'none';
                showToast("連線異常，請稍後再試。");
            });
        }
    </script>
