<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>5295 STUDIO | 頂級汽車美容</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        :root {
            --bg-color: #050505; 
            --gold-color: #d1c1a5; 
            --red-accent: #d92128; 
            --text-color: #f0f0f0;
            --box-bg: rgba(209, 193, 165, 0.05);
        }
        body { margin: 0; background-color: var(--bg-color); color: var(--text-color); font-family: 'Noto Sans TC', sans-serif; }
        header { text-align: center; padding: 20px 0; border-bottom: 1px solid rgba(209, 193, 165, 0.3); background: linear-gradient(180deg, #000 0%, #141414 100%); }
        .logo-text { font-family: 'Orbitron', sans-serif; font-size: 32px; font-weight: 700; letter-spacing: 4px; color: var(--gold-color); margin: 0; }
        .logo-text span { color: var(--red-accent); }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .tech-card { background-color: var(--box-bg); border: 1px solid var(--gold-color); border-radius: 8px; padding: 20px; margin-bottom: 20px; position: relative; }
        .tech-card::before { content: ''; position: absolute; top: -1px; left: -1px; width: 10px; height: 10px; border-top: 2px solid var(--red-accent); border-left: 2px solid var(--red-accent); }
        h2 { font-family: 'Orbitron', sans-serif; color: var(--gold-color); border-bottom: 1px dashed var(--gold-color); padding-bottom: 10px; margin-top: 0; }
        label { display: block; margin-top: 15px; font-size: 14px; color: #aaa; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; background-color: rgba(0,0,0,0.5); border: 1px solid var(--gold-color); color: var(--gold-color); border-radius: 4px; box-sizing: border-box; font-family: 'Noto Sans TC', sans-serif; }
        .btn-primary { display: block; width: 100%; padding: 15px; margin-top: 25px; background-color: var(--gold-color); color: #000; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; font-family: 'Orbitron', sans-serif; cursor: pointer; }
        .hidden { display: none; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-color); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: var(--gold-color); font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1 class="logo-text">52<span>9</span>5</h1>
        <p style="letter-spacing: 2px; margin-top: 10px;">SYSTEM LOADING...</p>
    </div>

    <header>
        <h1 class="logo-text">52<span>9</span>5 STUDIO</h1>
    </header>

    <div class="container">
        
        <div id="view-onboarding" class="hidden">
            <div class="tech-card">
                <h2>WELCOME</h2>
                <p style="font-size: 14px; color: #ccc;">歡迎來到 5295，請先建立您的愛車檔案。</p>
                <label>車牌號碼</label>
                <input type="text" id="new-plate" placeholder="例如: ABC-5295" style="text-transform: uppercase;">
                <label>廠牌</label>
                <input type="text" id="new-brand" placeholder="例如: Porsche">
                <label>車款型號</label>
                <input type="text" id="new-model" placeholder="例如: Macan">
                <label>車色</label>
                <input type="text" id="new-color" placeholder="例如: 蠟灰">
                <label>車輛級距 (攸關報價)</label>
                <select id="new-class">
                    <option value="轎車">轎車</option>
                    <option value="休旅車、旅行車">休旅車、旅行車</option>
                    <option value="大型休旅車">大型休旅車</option>
                    <option value="商務車">商務車</option>
                </select>
                <button class="btn-primary" onclick="submitNewCar()">建立專屬車庫</button>
            </div>
        </div>

        <div id="view-booking" class="hidden">
            <div class="tech-card">
                <h2>SERVICE BOOKING</h2>
                <label>選擇愛車</label>
                <select id="book-plate"></select>
                <label>預約日期</label>
                <input type="date" id="book-date">
                <label>服務項目</label>
                <select id="book-service">
                    <option value="精緻洗車">精緻洗車</option>
                    <option value="精緻打蠟">精緻打蠟</option>
                    <option value="深層美容">深層美容</option>
                    <option value="精緻鍍膜">精緻鍍膜</option>
                </select>
                <button class="btn-primary" onclick="submitBooking()">CONFIRM BOOKING</button>
            </div>
        </div>

        <div id="view-garage" class="hidden">
            <div class="tech-card">
                <h2>MY GARAGE</h2>
                <div id="garage-content" style="text-align: center; padding: 10px 0;">
                    </div>
            </div>
            <button class="btn-primary" onclick="location.href='?view=booking'" style="background-color: transparent; border: 1px solid var(--gold-color); color: var(--gold-color);">前往預約服務</button>
        </div>

    </div>

    <script>
        // ==========================================
        // 系統設定區 (請務必填寫)
        // ==========================================
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxmNAp5ZNstJXj5Vv9iXzyjhEpYC9wbd47A4aqRcJOY5pY4Jd7YWlh9Vn7OFjMhmP4g7g/exec'; 
        const LIFF_ID = '2008811649-QZq68T5c'; 

        let globalUserId = "";
        let globalLineName = "";
        let userCars = [];

        window.onload = function() {
            // 初始化 LIFF
            liff.init({ liffId: LIFF_ID }).then(() => {
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                liff.getProfile().then(profile => {
                    globalUserId = profile.userId;
                    globalLineName = profile.displayName;
                    checkUserDatabase(globalUserId);
                });
            }).catch(err => {
                console.error('LIFF 初始化失敗', err);
                alert('系統載入失敗，請確認在 LINE 環境中開啟。');
            });
        };

        // 呼叫 GAS API：檢查使用者狀態
        function checkUserDatabase(userId) {
            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "checkUser", userId: userId })
            })
            .then(response => response.json())
            .then(res => {
                document.getElementById('loading-screen').style.display = 'none';
                
                if (res.data.cars.length === 0) {
                    // 沒車，顯示建檔畫面
                    document.getElementById('view-onboarding').classList.remove('hidden');
                } else {
                    // 有車，記錄下來並根據網址導向
                    userCars = res.data.cars;
                    routeView(); 
                }
            })
            .catch(err => {
                alert("資料庫連線失敗，請稍後再試。");
            });
        }

        // 決定顯示預約還是車庫
        function routeView() {
            const urlParams = new URLSearchParams(window.location.search);
            const view = urlParams.get('view') || 'booking';

            if (view === 'garage') {
                renderGarage();
                document.getElementById('view-garage').classList.remove('hidden');
            } else {
                renderBooking();
                document.getElementById('view-booking').classList.remove('hidden');
            }
        }

        // 渲染車庫畫面
        function renderGarage() {
            const container = document.getElementById('garage-content');
            let html = '';
            userCars.forEach(car => {
                const imgTag = car.photoUrl ? `<img src="${car.photoUrl}" style="width:100%; border-radius:4px; margin-bottom:10px;">` : `<div style="width:100%; height:150px; background:#111; border:1px dashed #d1c1a5; display:flex; align-items:center; justify-content:center; color:#d1c1a5; margin-bottom:10px;">[ 尚無完工照片 ]</div>`;
                html += `
                    <div style="margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 15px;">
                        ${imgTag}
                        <h3 style="margin: 5px 0; font-family:'Orbitron'; color: var(--gold-color);">${car.plate}</h3>
                        <p style="margin: 0; color: #aaa;">${car.brand} ${car.model}</p>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // 渲染預約選單
        function renderBooking() {
            const select = document.getElementById('book-plate');
            select.innerHTML = '';
            userCars.forEach(car => {
                select.innerHTML += `<option value="${car.plate}">${car.plate} (${car.brand})</option>`;
            });
        }

        // 送出新車建檔
        function submitNewCar() {
            const data = {
                lineName: globalLineName,
                plate: document.getElementById('new-plate').value.toUpperCase(),
                brand: document.getElementById('new-brand').value,
                model: document.getElementById('new-model').value,
                color: document.getElementById('new-color').value,
                carClass: document.getElementById('new-class').value
            };

            if(!data.plate || !data.brand) return alert('請填寫車牌與廠牌！');

            document.getElementById('loading-screen').style.display = 'flex';
            
            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "addCar", userId: globalUserId, carData: data })
            }).then(() => {
                alert('愛車檔案建立成功！');
                window.location.href = '?view=booking'; // 建立完跳轉去預約
            });
        }

        // 送出預約
        function submitBooking() {
            const data = {
                plate: document.getElementById('book-plate').value,
                date: document.getElementById('book-date').value,
                service: document.getElementById('book-service').value
            };

            if(!data.date) return alert('請選擇預約日期！');

            document.getElementById('loading-screen').style.display = 'flex';

            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "addBooking", userId: globalUserId, bookingData: data })
            }).then(() => {
                alert('預約成功！我們將盡快與您聯繫確認。');
                liff.closeWindow(); // 預約完自動關閉 LINE 網頁
            });
        }
    </script>
</body>
</html>
